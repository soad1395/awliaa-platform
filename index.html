 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>منصة أولياء الأمور</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:tajawal;background:#0f172a;color:#fff;padding:20px}
input,select,textarea{width:100%;padding:10px;margin:5px 0;border-radius:10px}
button{padding:10px;border:none;border-radius:10px;margin:5px;cursor:pointer}
.send{background:#7c3aed;color:#fff}
.record{background:#059669;color:#fff}
.card{background:#fff;color:#000;padding:15px;margin:10px;border-radius:15px}
.del{background:red;color:#fff}
</style>
</head>

<body>

<h2>📩 منصة أولياء الأمور</h2>

<select id="sender">
<option value="المعلم">من المعلم</option>
<option value="ولي الأمر">من ولي الأمر</option>
</select>

<input id="student" placeholder="اسم الطالب">
<input id="class" placeholder="الصف">
<input id="subject" placeholder="المادة">

<textarea id="message" placeholder="اكتب الرسالة..."></textarea>

<button class="send" onclick="sendMessage()">إرسال</button>

<hr>

<button class="record" onclick="startRec()">🎤 تسجيل</button>
<button onclick="stopRec()">⏹ إيقاف</button>

<hr>

<h3>📬 الرسائل</h3>
<div id="messages"></div>

<script>

// 🔴 غيري هذه القيم فقط
const supabaseUrl = "PUT_URL_HERE";
const supabaseKey = "PUT_KEY_HERE";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

let recorder;
let audioBlob = null;

async function startRec(){
  const stream = await navigator.mediaDevices.getUserMedia({audio:true});
  recorder = new MediaRecorder(stream);

  let chunks = [];

  recorder.ondataavailable = e => chunks.push(e.data);

  recorder.onstop = ()=>{
    audioBlob = new Blob(chunks,{type:"audio/webm"});
  };

  recorder.start();
}

function stopRec(){
  recorder.stop();
}

async function uploadAudio(){
  if(!audioBlob) return null;

  const fileName = Date.now()+".webm";

  await supabase.storage.from("audio").upload(fileName,audioBlob);

  const { data } = supabase.storage.from("audio").getPublicUrl(fileName);

  return data.publicUrl;
}

async function sendMessage(){

  const audioUrl = await uploadAudio();

  await supabase.from("messages").insert([{
    sender: sender.value,
    student: student.value,
    class: document.getElementById("class").value,
    subject: subject.value,
    message: message.value,
    audio: audioUrl
  }]);

  loadMessages();
}

async function loadMessages(){

  const { data } = await supabase
  .from("messages")
  .select("*")
  .order("created_at",{ascending:false});

  messages.innerHTML="";

  data.forEach(m=>{
    messages.innerHTML+=`
    <div class="card">
    <b>${m.sender}</b><br>
    ${m.student} - ${m.class}<br>
    ${m.subject}<br>
    ${m.message || ""}<br>
    ${m.audio ? `<audio controls src="${m.audio}"></audio>` : ""}
    </div>
    `;
  });
}

loadMessages();

</script>

</body>
</html>
