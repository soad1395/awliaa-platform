 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>منصة أولياء الأمور</title>

<style>
body{
font-family:Tajawal;
background:#0b1d3a;
color:white;
margin:0;
}

.container{
padding:20px;
}

h1{
text-align:center;
}

input,select,textarea{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
}

button{
background:#6c3df4;
color:white;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
width:100%;
}

.card{
background:white;
color:black;
padding:10px;
margin-top:10px;
border-radius:10px;
}

.delete{
background:red;
margin-top:5px;
}

.audioBtn{
background:#0a7;
margin-top:5px;
}
</style>
</head>

<body>

<div class="container">

<h1>منصة أولياء الأمور</h1>

<h3>إضافة رسالة</h3>

<select id="type">
<option value="معلم">من المعلم</option>
<option value="ولي أمر">من ولي الأمر</option>
</select>

<input id="teacher" placeholder="اسم المعلمة">
<input id="student" placeholder="اسم الطالب">
<input id="class" placeholder="الصف">
<input id="subject" placeholder="المادة">

<textarea id="msg" placeholder="اكتب الرسالة"></textarea>

<button onclick="saveMsg()">إرسال</button>

<button class="audioBtn" onclick="startRecord()">🎤 تسجيل صوت</button>

<hr>

<h3>الرسائل</h3>

<div id="messages"></div>

</div>

<script>

let mediaRecorder;
let audioChunks=[];

function startRecord(){
navigator.mediaDevices.getUserMedia({audio:true})
.then(stream=>{
mediaRecorder=new MediaRecorder(stream);

mediaRecorder.start();

mediaRecorder.ondataavailable=e=>{
audioChunks.push(e.data);
};

mediaRecorder.onstop=()=>{
let blob=new Blob(audioChunks,{type:'audio/webm'});
let url=URL.createObjectURL(blob);

saveAudio(url);

audioChunks=[];
};

setTimeout(()=>mediaRecorder.stop(),4000);
});
}

function saveAudio(url){
let data=JSON.parse(localStorage.getItem("data")||"[]");

data.push({
audio:url,
time:new Date().toLocaleString()
});

localStorage.setItem("data",JSON.stringify(data));
show();
}

function saveMsg(){
let data=JSON.parse(localStorage.getItem("data")||"[]");

data.push({
type:document.getElementById("type").value,
teacher:document.getElementById("teacher").value,
student:document.getElementById("student").value,
class:document.getElementById("class").value,
subject:document.getElementById("subject").value,
msg:document.getElementById("msg").value,
time:new Date().toLocaleString()
});

localStorage.setItem("data",JSON.stringify(data));

alert("تم الحفظ");

show();
}

function del(i){
let data=JSON.parse(localStorage.getItem("data")||"[]");

data.splice(i,1);

localStorage.setItem("data",JSON.stringify(data));

show();
}

function show(){
let data=JSON.parse(localStorage.getItem("data")||"[]");

let out="";

data.forEach((d,i)=>{
out+=`
<div class="card">

<div>${d.type||""}</div>
<div>${d.teacher||""}</div>
<div>${d.student||""}</div>
<div>${d.class||""}</div>
<div>${d.subject||""}</div>
<div>${d.msg||""}</div>

${d.audio? `<audio controls src="${d.audio}"></audio>`:""}

<button class="delete" onclick="del(${i})">حذف</button>

</div>
`;
});

document.getElementById("messages").innerHTML=out;
}

show();

</script>

</body>
</html>
